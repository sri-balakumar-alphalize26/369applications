<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuel Entry - AI Verification</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 500px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }
        h1 { text-align: center; color: #333; margin-bottom: 8px; font-size: 24px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 24px; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; color: #333; font-size: 14px; }
        input, select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }
        input:focus, select:focus { outline: none; border-color: #667eea; }
        .file-upload {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px;
            border: 2px dashed #ccc;
            border-radius: 10px;
            cursor: pointer;
            position: relative;
        }
        .file-upload:hover { border-color: #667eea; background: #f8f9ff; }
        .file-upload input {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }
        .file-upload-icon { font-size: 40px; margin-bottom: 10px; }
        .file-upload-text { color: #666; font-size: 14px; }
        .file-name { margin-top: 10px; color: #667eea; font-weight: 600; }
        .preview-image { max-width: 100%; max-height: 200px; margin-top: 15px; border-radius: 8px; }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(102,126,234,0.4); }
        .btn-reset { background: #6c757d; color: white; margin-top: 10px; }
        .result-card { display: none; }
        .result-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
        .result-icon { font-size: 48px; }
        .result-title { font-size: 24px; font-weight: 700; }
        .result-ok .result-title { color: #10b981; }
        .result-fraud .result-title { color: #ef4444; }
        .result-details { background: #f8f9fa; border-radius: 10px; padding: 16px; margin-bottom: 16px; }
        .detail-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #e0e0e0; }
        .detail-row:last-child { border-bottom: none; }
        .detail-label { color: #666; }
        .detail-value { font-weight: 600; }
        .issues-list { background: #fef2f2; border: 1px solid #fecaca; border-radius: 10px; padding: 16px; margin-bottom: 16px; }
        .issues-list h4 { color: #dc2626; margin-bottom: 12px; }
        .issue-item { display: flex; gap: 8px; margin-bottom: 8px; color: #7f1d1d; }
        .saved-info { background: #ecfdf5; border: 1px solid #a7f3d0; border-radius: 10px; padding: 16px; margin-bottom: 16px; text-align: center; }
        .saved-info h4 { color: #059669; margin-bottom: 8px; }
        .saved-info p { color: #065f46; font-size: 14px; }
        .loading { display: none; text-align: center; padding: 40px; }
        .spinner {
            width: 50px; height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .config-section { background: #fff3cd; border: 1px solid #ffc107; border-radius: 10px; padding: 16px; margin-bottom: 20px; }
        .config-section label { color: #856404; }
        .tank-info { background: #e8f4fd; border-radius: 8px; padding: 12px; margin-top: 10px; font-size: 14px; color: #0c5460; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Config Section -->
        <div class="card config-section">
            <div class="form-group">
                <label>⚙️ Odoo Server URL</label>
                <input type="text" id="serverUrl" value="http://localhost:8069">
            </div>
            <button class="btn btn-primary" onclick="checkConnection()" style="background: #ffc107; color: #333;">
                Check Connection
            </button>
            <div id="connectionStatus" style="margin-top: 10px; text-align: center;"></div>
        </div>

        <!-- Main Form -->
        <div class="card" id="formCard">
            <h1>⛽ Fuel Entry</h1>
            <p class="subtitle">Submit → Auto Verify → Save to Odoo</p>
            
            <form id="fuelForm">
                <div class="form-group">
                    <label>📋 Trip (Vehicle Tracking)</label>
                    <select id="vehicleTrackingId" required>
                        <option value="">Select Trip...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>🚗 Vehicle</label>
                    <select id="vehicleId" required>
                        <option value="">Select Vehicle...</option>
                    </select>
                    <div id="tankInfo" class="tank-info" style="display: none;">
                        Tank Capacity: <strong id="tankCapacity">0</strong> Litres
                    </div>
                </div>

                <div class="form-group">
                    <label>👤 Driver</label>
                    <select id="driverId" required>
                        <option value="">Select Driver...</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>💰 Amount (OMR)</label>
                    <input type="number" id="amount" step="0.001" placeholder="0.000" required>
                </div>
                
                <div class="form-group">
                    <label>🛢️ Fuel Level (Litres)</label>
                    <input type="number" id="fuelLevel" step="0.01" placeholder="0.00" required>
                </div>
                
                <div class="form-group">
                    <label>🧾 Receipt Image</label>
                    <div class="file-upload">
                        <div class="file-upload-icon">📷</div>
                        <div class="file-upload-text">Tap to upload receipt</div>
                        <input type="file" id="receiptImage" accept="image/*" capture="environment">
                        <div class="file-name" id="fileName"></div>
                        <img id="imagePreview" class="preview-image" style="display: none;">
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary">📤 Submit & Verify</button>
            </form>
        </div>

        <!-- Loading -->
        <div class="card loading" id="loadingCard">
            <div class="spinner"></div>
            <p>Submitting & Verifying...</p>
        </div>

        <!-- Result -->
        <div class="card result-card" id="resultCard">
            <div class="result-header">
                <div class="result-icon" id="resultIcon">✅</div>
                <div class="result-title" id="resultTitle">Verified</div>
            </div>

            <div class="saved-info" id="savedInfo">
                <h4>💾 Saved to Odoo</h4>
                <p>Fuel Log: <strong id="fuelLogRef">-</strong></p>
            </div>
            
            <div class="result-details">
                <h4 style="margin-bottom: 12px;">📊 Details</h4>
                <div class="detail-row">
                    <span class="detail-label">Entered Amount</span>
                    <span class="detail-value" id="enteredAmount">-</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Receipt Amount (OCR)</span>
                    <span class="detail-value" id="ocrAmount">-</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Entered Litres</span>
                    <span class="detail-value" id="enteredLitres">-</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Receipt Litres (OCR)</span>
                    <span class="detail-value" id="ocrLitres">-</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Tank Capacity</span>
                    <span class="detail-value" id="resultTankCapacity">-</span>
                </div>
            </div>
            
            <div class="issues-list" id="issuesList" style="display: none;">
                <h4>⚠️ Issues Detected</h4>
                <div id="issuesContent"></div>
            </div>
            
            <button class="btn btn-reset" onclick="resetForm()">← New Entry</button>
        </div>
    </div>

    <script>
        let vehicles = [], drivers = [], trips = [];
        let selectedVehicle = null, receiptBase64 = null;

        document.addEventListener('DOMContentLoaded', () => checkConnection());

        async function checkConnection() {
            const serverUrl = document.getElementById('serverUrl').value;
            const statusDiv = document.getElementById('connectionStatus');
            statusDiv.innerHTML = '<span style="color: #666;">Checking...</span>';
            
            try {
                const response = await fetch(`${serverUrl}/api/ai/status`);
                const data = await response.json();
                
                if (data.status === 'ok') {
                    statusDiv.innerHTML = `<span style="color: #10b981;">✅ Connected</span><br>
                        <small>AI: ${data.ai_available ? '✅ Ready' : '❌ Not configured'}</small>`;
                    loadVehicles();
                    loadDrivers();
                    loadTrips();
                } else {
                    statusDiv.innerHTML = '<span style="color: #ef4444;">❌ Failed</span>';
                }
            } catch (error) {
                statusDiv.innerHTML = `<span style="color: #ef4444;">❌ ${error.message}</span>`;
            }
        }

        async function loadVehicles() {
            const serverUrl = document.getElementById('serverUrl').value;
            try {
                const response = await fetch(`${serverUrl}/api/vehicles`);
                const data = await response.json();
                if (data.status === 'ok') {
                    vehicles = data.vehicles;
                    const select = document.getElementById('vehicleId');
                    select.innerHTML = '<option value="">Select Vehicle...</option>';
                    vehicles.forEach(v => {
                        select.innerHTML += `<option value="${v.id}">${v.name} (${v.license_plate}) - Tank: ${v.tank_capacity}L</option>`;
                    });
                }
            } catch (e) { console.error(e); }
        }

        async function loadDrivers() {
            const serverUrl = document.getElementById('serverUrl').value;
            try {
                const response = await fetch(`${serverUrl}/api/drivers`);
                const data = await response.json();
                if (data.status === 'ok') {
                    drivers = data.drivers;
                    const select = document.getElementById('driverId');
                    select.innerHTML = '<option value="">Select Driver...</option>';
                    drivers.forEach(d => {
                        select.innerHTML += `<option value="${d.id}">${d.name}</option>`;
                    });
                }
            } catch (e) { 
                document.getElementById('driverId').innerHTML = '<option value="1">Default Driver</option>';
            }
        }

        async function loadTrips() {
            const serverUrl = document.getElementById('serverUrl').value;
            try {
                const response = await fetch(`${serverUrl}/api/trips`);
                const data = await response.json();
                if (data.status === 'ok') {
                    trips = data.trips;
                    const select = document.getElementById('vehicleTrackingId');
                    select.innerHTML = '<option value="">Select Trip...</option>';
                    trips.forEach(t => {
                        select.innerHTML += `<option value="${t.id}">${t.name} - ${t.vehicle}</option>`;
                    });
                }
            } catch (e) {
                document.getElementById('vehicleTrackingId').innerHTML = '<option value="1">Default Trip</option>';
            }
        }

        document.getElementById('vehicleId').addEventListener('change', function() {
            const vehicleId = parseInt(this.value);
            selectedVehicle = vehicles.find(v => v.id === vehicleId);
            if (selectedVehicle) {
                document.getElementById('tankInfo').style.display = 'block';
                document.getElementById('tankCapacity').textContent = selectedVehicle.tank_capacity;
            } else {
                document.getElementById('tankInfo').style.display = 'none';
            }
        });

        document.getElementById('receiptImage').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                document.getElementById('fileName').textContent = file.name;
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('imagePreview').src = e.target.result;
                    document.getElementById('imagePreview').style.display = 'block';
                    receiptBase64 = e.target.result.split(',')[1];
                };
                reader.readAsDataURL(file);
            }
        });

        document.getElementById('fuelForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const serverUrl = document.getElementById('serverUrl').value;
            const vehicleTrackingId = document.getElementById('vehicleTrackingId').value;
            const vehicleId = document.getElementById('vehicleId').value;
            const driverId = document.getElementById('driverId').value;
            const amount = parseFloat(document.getElementById('amount').value);
            const fuelLevel = parseFloat(document.getElementById('fuelLevel').value);
            
            if (!vehicleId) { alert('Please select a vehicle'); return; }
            
            document.getElementById('formCard').style.display = 'none';
            document.getElementById('loadingCard').style.display = 'block';
            document.getElementById('resultCard').style.display = 'none';
            
            try {
                const requestBody = {
                    vehicle_tracking_id: parseInt(vehicleTrackingId) || 1,
                    vehicle_id: parseInt(vehicleId),
                    driver_id: parseInt(driverId) || 1,
                    amount: amount,
                    fuel_level: fuelLevel
                };
                
                if (receiptBase64) {
                    requestBody.receipt_image_base64 = receiptBase64;
                }
                
                const response = await fetch(`${serverUrl}/api/fuel/submit`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestBody)
                });
                
                const data = await response.json();
                showResult(data);
                
            } catch (error) {
                alert('Error: ' + error.message);
                document.getElementById('formCard').style.display = 'block';
                document.getElementById('loadingCard').style.display = 'none';
            }
        });

        function showResult(data) {
            document.getElementById('loadingCard').style.display = 'none';
            document.getElementById('resultCard').style.display = 'block';
            
            const isOk = data.status === 'ok';
            document.getElementById('resultIcon').textContent = isOk ? '✅' : '🚨';
            document.getElementById('resultTitle').textContent = isOk ? 'All Checks Passed!' : 'Fraud Detected!';
            document.getElementById('resultCard').className = `card result-card ${isOk ? 'result-ok' : 'result-fraud'}`;
            
            if (data.saved) {
                document.getElementById('savedInfo').style.display = 'block';
                document.getElementById('fuelLogRef').textContent = data.fuel_log_ref || `ID: ${data.fuel_log_id}`;
            } else {
                document.getElementById('savedInfo').style.display = 'none';
            }
            
            document.getElementById('enteredAmount').textContent = `${data.entered?.amount || 0} OMR`;
            document.getElementById('ocrAmount').textContent = data.ocr_result?.amount ? `${data.ocr_result.amount} OMR` : 'N/A';
            document.getElementById('enteredLitres').textContent = `${data.entered?.fuel_level || 0} L`;
            document.getElementById('ocrLitres').textContent = data.ocr_result?.litres ? `${data.ocr_result.litres} L` : 'N/A';
            document.getElementById('resultTankCapacity').textContent = `${data.vehicle?.tank_capacity || 0} L`;
            
            const issuesList = document.getElementById('issuesList');
            if (data.issues && data.issues.length > 0) {
                issuesList.style.display = 'block';
                document.getElementById('issuesContent').innerHTML = data.issues.map(i => `<div class="issue-item">⚠️ ${i}</div>`).join('');
            } else {
                issuesList.style.display = 'none';
            }
        }

        function resetForm() {
            document.getElementById('fuelForm').reset();
            document.getElementById('imagePreview').style.display = 'none';
            document.getElementById('fileName').textContent = '';
            document.getElementById('tankInfo').style.display = 'none';
            receiptBase64 = null;
            selectedVehicle = null;
            document.getElementById('formCard').style.display = 'block';
            document.getElementById('resultCard').style.display = 'none';
        }
    </script>
</body>
</html>
